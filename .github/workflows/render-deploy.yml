name: Deploy to Render

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub deployment
        id: create_deployment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          response=$(curl -fsS -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/$REPO/deployments \
            -d "{\"ref\":\"$SHA\",\"environment\":\"render-production\",\"required_contexts\":[],\"auto_merge\":false,\"description\":\"Deploy to Render\"}")

          deployment_id=$(python3 - <<'PY'
          import json, sys
          data = json.loads(sys.stdin.read())
          deployment_id = data.get('id')
          if not deployment_id:
            raise SystemExit('Missing deployment id in GitHub response')
          print(deployment_id)
          PY
          <<<"$response")

          echo "deployment_id=$deployment_id" >> "$GITHUB_OUTPUT"

      - name: Mark deployment in progress
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          DEPLOYMENT_ID: ${{ steps.create_deployment.outputs.deployment_id }}
          SERVICE_URL: ${{ secrets.RENDER_SERVICE_URL }}
        run: |
          set -euo pipefail

          payload=$(python3 - <<'PY'
          import json, os
          payload = {"state": "in_progress", "description": "Render deploy triggered"}
          service_url = os.environ.get('SERVICE_URL', '').strip()
          if service_url:
            payload["environment_url"] = service_url
          print(json.dumps(payload))
          PY
          )

          curl -fsS -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/$REPO/deployments/$DEPLOYMENT_ID/statuses \
            -d "$payload" > /dev/null

      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          set -euo pipefail
          if [ -z "${RENDER_DEPLOY_HOOK_URL:-}" ]; then
            echo "Missing secret: RENDER_DEPLOY_HOOK_URL" >&2
            exit 1
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL" > /dev/null

      - name: Mark deployment success
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          DEPLOYMENT_ID: ${{ steps.create_deployment.outputs.deployment_id }}
          SERVICE_URL: ${{ secrets.RENDER_SERVICE_URL }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          payload=$(python3 - <<'PY'
          import json, os
          payload = {
            "state": "success",
            "description": "Render deploy hook called",
            "log_url": os.environ.get('RUN_URL', '')
          }
          service_url = os.environ.get('SERVICE_URL', '').strip()
          if service_url:
            payload["environment_url"] = service_url
          print(json.dumps(payload))
          PY
          )

          curl -fsS -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/$REPO/deployments/$DEPLOYMENT_ID/statuses \
            -d "$payload" > /dev/null

      - name: Mark deployment failure
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          DEPLOYMENT_ID: ${{ steps.create_deployment.outputs.deployment_id }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          payload=$(python3 - <<'PY'
          import json, os
          payload = {
            "state": "failure",
            "description": "Render deploy hook failed",
            "log_url": os.environ.get('RUN_URL', '')
          }
          print(json.dumps(payload))
          PY
          )

          curl -fsS -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/$REPO/deployments/$DEPLOYMENT_ID/statuses \
            -d "$payload" > /dev/null
